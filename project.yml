# XcodeGen spec — run `xcodegen generate` to produce HealthAssistant.xcodeproj
#
# Replace `com.example` with your own reverse-DNS prefix before building, and set
# DEVELOPMENT_TEAM in Xcode (or here) to your Apple Developer team ID.

name: HealthAssistant

options:
  bundleIdPrefix: com.example
  deploymentTarget:
    iOS: "17.0"          # SwiftData requires iOS 17+
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
    # DEVELOPMENT_TEAM: XXXXXXXXXX   # set your team ID

targets:
  HealthAssistant:
    type: application
    platform: iOS
    sources:
      - Sources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.example.healthassistant
        INFOPLIST_KEY_UILaunchScreen_Generation: true
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: true
        # Family Controls entitlement is added once you have Apple approval:
        # CODE_SIGN_ENTITLEMENTS: Sources/HealthAssistant.entitlements
    dependencies:
      - target: DeviceActivityMonitorExtension
    # App Group is shared with the extension so the threshold signal can cross
    # the sandbox boundary. Create it in your Apple Developer account, then add
    # the matching capability here once entitlements are set up.

  DeviceActivityMonitorExtension:
    type: app-extension
    platform: iOS
    sources:
      - DeviceActivityMonitorExtension
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.example.healthassistant.monitor
        INFOPLIST_FILE: DeviceActivityMonitorExtension/Info.plist
